<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <label for="campo-nome">Nome:</label>
    <br>
    
    <input type="text" id="campo-nome" name="nome">
    <br>
    <label>Sexo:</label>
        <input type="radio" id="masc" name="sexo" value="M">
        <label for="masc">Masculino</label>
        
        <input type="radio" id="fem" name="sexo" value="F">
        <label for="fem">Feminino</label>
        <br>
        <label for="estado civil">Estado Civil:</label>
        <select id="estado civil" name="estado-civil">
            <option value="sol">Solteitro</option>
            <option value="cas">Casado</option>
            <option value="viu">Viúvo</option>
            <option value="divor">Divorciado</option>
            <option value="out">Outro</option>
        </select> 
    <br>
    <label for="campo-email">E-mail:</label>
    <br>
    <input type="email" id="campo-email" name="email">
    <br>
    <label for="compo-endereco">Endereço:</label>
    <br>
    <input type="text" id="campo-endereco" name="endereco">
    <br>
    <label for="numero">Numero:</label>
    <br>
    <input type="number" id="numero" name="rua">
    <br>
    <label for="nascimento">Data de Nascimento:</label>
    <br>
    <input type="date" id="nascimento" name="nascimento">
    <br>

        <label>Sexo:</label>
        <input type="radio" id="masc" name="sexo" value="M">
        <label for="masc">Masculino</label>
        
        <input type="radio" id="fem" name="sexo" value="F">
        <label for="fem">Feminino</label>
        <br>
        <label for="estado civil">Estado Civil:</label>
        <select id="estado civil" name="estado-civil">
            <option value="sol">Solteitro</option>
            <option value="cas">Casado</option>
            <option value="viu">Viúvo</option>
            <option value="divor">Divorciado</option>
            <option value="out">Outro</option>
        </select> 
    <br>
    <label for="celular">Celular:</label>
    <input type="tel" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX">
    <br>
    <label for="url">Página Pessoal:</label>
    <br>
    <input type="url" id="url" name="url" placeholder="https://seusite.com">
    <br>
    <button type="submit">Cadastrar</button>
    <button type="reset">Limpar</button>
    </form>
</body>
</html>
